name: repo-port-bot
description: Automatically port merged changes to a paired repository.
author: superbuilders

inputs:
    github-token:
        description: Fallback GitHub token used for source reads and target writes.
        required: false
    source-github-token:
        description: Optional GitHub token for source repository reads.
        required: false
    target-github-token:
        description: Optional GitHub token for target repository writes.
        required: false
    llm-api-key:
        description: Anthropic API key used by the Claude agent provider.
        required: true
    target-repo:
        description: Target repository in owner/name format.
        required: true
    target-default-branch:
        description: Default branch for the target repository checkout and PR base.
        required: false
        default: main
    validation-commands:
        description: Newline-separated validation commands to run in target repo.
        required: false
        default: ''
    path-mappings:
        description: JSON object mapping source paths to target paths.
        required: false
        default: '{}'
    naming-conventions:
        description: Optional naming convention guidance for the agent prompt.
        required: false
        default: ''
    prompt:
        description: Additional custom prompt instructions.
        required: false
        default: ''
    skip-port-bot-json:
        description: Skip fetching port-bot.json from source repo at merge SHA.
        required: false
        default: 'false'
    model:
        description: Claude model to use.
        required: false
        default: claude-sonnet-4-6
    max-attempts:
        description: Maximum number of execution attempts before stalling.
        required: false
        default: '3'
    max-turns:
        description: Maximum Claude SDK turns per attempt.
        required: false
        default: '50'
    max-budget-usd:
        description: Optional budget cap (USD) for a single attempt.
        required: false
        default: ''
    log-level:
        description: Minimum log level for stdout output (error, warn, info, debug).
        required: false
        default: info

outputs:
    run-id:
        description: Unique identifier for this port run.
        value: ${{ steps.run.outputs['run-id'] }}
    outcome:
        description: Final run outcome from the engine.
        value: ${{ steps.run.outputs.outcome }}
    pr-url:
        description: URL of created target pull request, if any.
        value: ${{ steps.run.outputs['pr-url'] }}
    issue-url:
        description: URL of created follow-up issue, if any.
        value: ${{ steps.run.outputs['issue-url'] }}
    summary:
        description: Human-readable run summary.
        value: ${{ steps.run.outputs.summary }}

runs:
    using: composite
    steps:
        - name: Install Bun
          uses: oven-sh/setup-bun@v2
          with:
              bun-version: '1.3.6'

        - name: Install dependencies
          shell: bash
          run: |
              cd "${GITHUB_ACTION_PATH}"
              bun install --production --frozen-lockfile

        - name: Run port bot
          id: run
          shell: bash
          run: |
              bun run "${GITHUB_ACTION_PATH}/packages/action/src/index.ts"
          env:
              INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
              INPUT_SOURCE-GITHUB-TOKEN: ${{ inputs.source-github-token }}
              INPUT_TARGET-GITHUB-TOKEN: ${{ inputs.target-github-token }}
              INPUT_LLM-API-KEY: ${{ inputs.llm-api-key }}
              INPUT_TARGET-REPO: ${{ inputs.target-repo }}
              INPUT_TARGET-DEFAULT-BRANCH: ${{ inputs.target-default-branch }}
              INPUT_VALIDATION-COMMANDS: ${{ inputs.validation-commands }}
              INPUT_PATH-MAPPINGS: ${{ inputs.path-mappings }}
              INPUT_NAMING-CONVENTIONS: ${{ inputs.naming-conventions }}
              INPUT_PROMPT: ${{ inputs.prompt }}
              INPUT_SKIP-PORT-BOT-JSON: ${{ inputs.skip-port-bot-json }}
              INPUT_MODEL: ${{ inputs.model }}
              INPUT_MAX-ATTEMPTS: ${{ inputs.max-attempts }}
              INPUT_MAX-TURNS: ${{ inputs.max-turns }}
              INPUT_MAX-BUDGET-USD: ${{ inputs.max-budget-usd }}
              INPUT_LOG-LEVEL: ${{ inputs.log-level }}
