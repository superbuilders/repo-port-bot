name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - run: bun run check

            - run: bun run test

            - run: bun run build --filter=@repo-port-bot/action

            - name: Commit bundle and update v1 tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add -f packages/action/dist/index.cjs
                  if git diff --cached --quiet; then
                    echo "No bundle changes to commit."
                  else
                    git commit -m "chore(release): build action bundle"
                  fi
                  git tag -f v1
                  git push origin main --tags --force
