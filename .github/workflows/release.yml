name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - run: bun run check

            - run: bun run test

            - name: Update v1 tag
              run: |
                  git tag -f v1
                  git push origin refs/tags/v1 --force
